<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrossDump.ai — PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-pink: #f472b6;
            --neon-green: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0; overflow: hidden;
            background: #020617;
            font-family: 'Orbitron', sans-serif;
            color: white;
            user-select: none;
        }

        /* --- Boot Overlay (Unlocks Audio) --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; transition: 0.5s;
        }

        /* --- UI Elements --- */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 15px; border-radius: 8px;
            border-left: 4px solid var(--neon-blue);
            font-size: 18px;
        }

        #hearts { color: var(--danger); font-size: 24px; letter-spacing: 5px; }

        /* --- Shop --- */
        #shop-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 20px; background: var(--neon-blue);
            color: #000; border-radius: 8px; cursor: pointer;
            font-weight: 900; z-index: 20;
        }

        /* --- Game Objects --- */
        #bin {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); font-size: 80px;
            z-index: 5; pointer-events: none;
        }

        .item { position: absolute; font-size: 50px; transition: transform 0.1s; }
        .poop { filter: drop-shadow(0 0 10px #78350f); z-index: 6; }

        /* --- Game Over --- */
        #gameover {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.95);
            padding: 50px; border-radius: 20px; border: 2px solid var(--neon-pink);
            text-align: center; z-index: 100;
        }

        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(-55%); }
            75% { transform: translateX(-45%); }
        }

        button {
            padding: 15px 30px; border: none; background: var(--neon-blue);
            color: #000; font-weight: 900; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron'; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="color:var(--neon-blue); letter-spacing:10px;">GROSSDUMP.AI</h1>
    <button onclick="initGame()">INITIALIZE SYSTEMS</button>
</div>

<div id="hud">
    <div class="stat-box">SCORE: <span id="score">0</span></div>
    <div class="stat-box">COINS: 💰 <span id="coins">0</span></div>
    <div id="hearts">❤️❤️❤️</div>
    <div id="combo-alert" style="color:orange; font-weight:900;"></div>
</div>

<div id="shop-btn" onclick="buyHeart()">❤️ BUY LIFE (150💰)</div>

<div id="bin">🗑️</div>

<div id="gameover">
    <h1 id="death-msg" style="color:var(--neon-pink);">SYSTEM FAILURE</h1>
    <p id="final-score" style="font-size:24px;"></p>
    <button onclick="location.reload()">REBOOT</button>
</div>

<script>
    // --- Audio System ---
    const sfx = {
        catch: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        poop: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),
        miss: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        buy: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3')
    };

    let score = 0, coins = 0, lives = 3, combo = 0, speed = 6;
    let playing = false;
    let binX = window.innerWidth / 2;
    const bin = document.getElementById('bin');

    function initGame() {
        // Unlock audio context
        Object.values(sfx).forEach(a => { a.play(); a.pause(); a.currentTime = 0; });
        document.getElementById('boot-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            playing = true;
            gameLoop();
        }, 500);
    }

    document.addEventListener('mousemove', e => {
        binX = e.clientX;
        bin.style.left = binX + 'px';
    });

    function buyHeart() {
        if (coins >= 150) {
            coins -= 150; lives++;
            sfx.buy.play();
            updateUI();
        }
    }

    function spawn() {
        if (!playing) return;
        
        const obj = document.createElement('div');
        const isPoop = Math.random() < 0.18;
        obj.className = isPoop ? 'item poop' : 'item';
        obj.innerText = isPoop ? '💩' : ["🍌", "🧻", "🥤", "🍕", "🍔"][Math.floor(Math.random() * 5)];
        
        let x = Math.random() * (window.innerWidth - 60);
        obj.style.left = x + 'px';
        obj.style.top = '-100px';
        document.body.appendChild(obj);

        let y = -100;
        let fall = setInterval(() => {
            if (!playing) { clearInterval(fall); obj.remove(); return; }

            y += speed;
            obj.style.top = y + 'px';

            const bRect = bin.getBoundingClientRect();
            const oRect = obj.getBoundingClientRect();

            // Collision
            if (oRect.bottom >= bRect.top && oRect.left < bRect.right && oRect.right > bRect.left) {
                if (isPoop) {
                    sfx.poop.play();
                    gameOver("CAUGHT TOXIC WASTE 💩");
                } else {
                    sfx.catch.currentTime = 0;
                    sfx.catch.play();
                    combo++; score += (10 * combo); coins += 5;
                    speed += 0.15;
                    triggerJuice();
                }
                clearInterval(fall); obj.remove();
                updateUI();
            }

            // Missed
            if (y > window.innerHeight) {
                if (!isPoop) {
                    lives--;
                    sfx.miss.play();
                    combo = 0;
                    document.body.style.background
