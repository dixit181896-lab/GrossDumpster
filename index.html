<!DOCTYPE html>
<html>
<head>

<title>GrossDump.ai — Catch The Trash</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#000,#111);
font-family:Arial;
color:white;
text-align:center;
}

#logo{

position:absolute;
top:40%;
width:100%;
font-size:50px;
font-weight:bold;
animation:fade 3s forwards;
z-index:5;

}

@keyframes fade{

0%{opacity:1;}
100%{opacity:0;visibility:hidden;}

}

#game{

width:100vw;
height:100vh;
position:relative;

}

#bin{

position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:70px;

}

.trash{

position:absolute;
font-size:45px;

}

#score{

position:absolute;
top:10px;
left:15px;
font-size:24px;

}

#combo{

position:absolute;
top:40px;
left:15px;
color:orange;

}

#gameover{

display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000c;
padding:30px;
border-radius:15px;

}

button{

padding:10px 20px;
border:none;
background:lime;
font-size:18px;
cursor:pointer;

}

</style>

</head>

<body>

<div id="logo">🗑️ GROSSDUMP.AI 🗑️</div>

<div id="game">

<div id="score">Score : 0</div>
<div id="combo"></div>

<div id="bin">🗑️</div>

<div id="gameover">

<h2>Game Over 💀</h2>

<p id="finalscore"></p>

<button onclick="restart()">Restart</button>

</div>

</div>

<audio id="bgm" loop>

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8d5f3a.mp3?filename=future-bass-117997.mp3">

</audio>

<script>

let game=document.getElementById("game");
let bin=document.getElementById("bin");

let score=0;
let combo=0;

let speed=3;

let playing=true;

let binX=window.innerWidth/2;

setTimeout(()=>{

document.getElementById("bgm").play();

},3000);


document.addEventListener("mousemove",e=>{

binX=e.clientX;

bin.style.left=binX+"px";

});

document.addEventListener("touchmove",e=>{

binX=e.touches[0].clientX;

bin.style.left=binX+"px";

});

function spawnTrash(){

if(!playing)return;

let trash=document.createElement("div");

trash.className="trash";

let emojis=["🍌","🧻","🥤","🍕","🗞️","🍔"];

trash.innerText=emojis[Math.floor(Math.random()*emojis.length)];

let x=Math.random()*window.innerWidth;

trash.style.left=x+"px";

game.appendChild(trash);

let y=0;

let fall=setInterval(()=>{

y+=speed;

trash.style.top=y+"px";

let binRect=bin.getBoundingClientRect();

let trashRect=trash.getBoundingClientRect();

if(

trashRect.bottom>=binRect.top &&

trashRect.left<binRect.right &&

trashRect.right>binRect.left

){

combo++;

score+=combo;

document.getElementById("score")
.innerText="Score : "+score;

document.getElementById("combo")
.innerText="Combo x"+combo+" 🔥";

trash.remove();

clearInterval(fall);

speed+=0.15;

}

if(y>window.innerHeight){

combo=0;

document.getElementById("combo")
.innerText="";

trash.remove();

clearInterval(fall);

gameOver();

}

},20);

}

function gameOver(){

playing=false;

document.getElementById("finalscore")
.innerText="Final Score : "+score;

document.getElementById("gameover")
.style.display="block";

}

function restart(){

location.reload();

}

setInterval(spawnTrash,1100);

</script>

</body>
</html>
