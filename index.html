<!DOCTYPE html>
<html>
<head>

<title>GrossDump - By Dixit</title>

<style>

body{

margin:0;
overflow:hidden;
background:#050505;
font-family:Arial;
color:white;

}

#game{

width:100vw;
height:100vh;
position:relative;

}

#bin{

position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:75px;

}

.trash{

position:absolute;
font-size:45px;

}

#score{

position:absolute;
top:10px;
left:15px;
font-size:26px;
color:#00ffcc;
text-shadow:0 0 15px #00ffcc;

}

#combo{

position:absolute;
top:45px;
left:15px;
color:orange;
font-size:22px;

}

#gameover{

display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000d;
padding:30px;
border-radius:15px;
text-align:center;

}

button{

padding:10px 20px;
border:none;
background:#00ffcc;
cursor:pointer;
font-size:18px;
border-radius:10px;

}

.shake{

animation:shake .3s;

}

@keyframes shake{

0%{transform:translate(0,0);}
25%{transform:translate(6px,-6px);}
50%{transform:translate(-6px,6px);}
75%{transform:translate(6px,6px);}
100%{transform:translate(0,0);}

}

</style>

</head>

<body>

<div id="game">

<div id="score">Score : 0</div>

<div id="combo"></div>

<div id="bin">🗑️</div>

<div id="gameover">

<h2>Game Over 💀</h2>

<p id="finalscore"></p>

<button onclick="restart()">Restart</button>

<button onclick="home()">Home</button>

</div>

</div>

<audio id="catchSound">

<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_9c65a6.mp3">

</audio>

<audio id="missSound">

<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_9f8c43.mp3">

</audio>

<script>

let game=document.getElementById("game");

let bin=document.getElementById("bin");

let score=0;

let combo=0;

let speed=3;

let playing=true;

let binX=window.innerWidth/2;

document.addEventListener("mousemove",e=>{

binX=e.clientX;

bin.style.left=binX+"px";

});

document.addEventListener("touchmove",e=>{

binX=e.touches[0].clientX;

bin.style.left=binX+"px";

});

function spawnTrash(){

if(!playing)return;

let trash=document.createElement("div");

trash.className="trash";

let emojis=["🍌","🧻","🥤","🍕","🗞️","🍔","🧃"];

trash.innerText=

emojis[Math.floor(Math.random()*emojis.length)];

trash.style.left=

Math.random()*window.innerWidth+"px";

game.appendChild(trash);

let y=0;

let fall=setInterval(()=>{

y+=speed;

trash.style.top=y+"px";

let binRect=bin.getBoundingClientRect();

let trashRect=trash.getBoundingClientRect();

if(

trashRect.bottom>=binRect.top &&

trashRect.left<binRect.right &&

trashRect.right>binRect.left

){

combo++;

score+=combo;

document.getElementById("score")

.innerText="Score : "+score;

document.getElementById("combo")

.innerText="Combo x"+combo+" 🔥";

document.getElementById("catchSound").play();

trash.remove();

clearInterval(fall);

speed+=0.12;

}

if(y>window.innerHeight){

combo=0;

document.getElementById("combo").innerText="";

document.getElementById("missSound").play();

screenShake();

trash.remove();

clearInterval(fall);

gameOver();

}

},20);

}

function screenShake(){

document.body.classList.add("shake");

setTimeout(()=>{

document.body.classList.remove("shake");

},300);

}

function gameOver(){

playing=false;

document.getElementById("finalscore")

.innerText="Final Score-You Poop : "+score;

document.getElementById("gameover")

.style.display="block";

}

function restart(){

location.reload();

}

function home(){

window.location="index.html";

}

setInterval(spawnTrash,1000);

</script>

</body>
</html>
