<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrossDump.ai — OVERDRIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

<style>
    :root {
        --neon-blue: #38bdf8;
        --neon-pink: #f472b6;
        --neon-green: #22c55e;
        --hazard: #fbbf24;
    }

    body {
        margin: 0; overflow: hidden;
        background: #020617;
        font-family: 'Orbitron', sans-serif;
        color: white;
        text-align: center;
    }

    /* UI Layer */
    #ui-layer {
        position: absolute; top: 10px; left: 15px; text-align: left; z-index: 10;
        pointer-events: none;
    }
    .stat { font-size: 20px; text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 5px; }
    #coins { color: #facc15; }

    #shop-toggle {
        position: absolute; top: 10px; right: 15px;
        background: rgba(255,255,255,0.1); padding: 10px;
        border-radius: 12px; border: 1px solid var(--neon-blue);
        cursor: pointer; pointer-events: all; z-index: 20;
    }

    #shop-menu {
        display: none; position: absolute; top: 70px; right: 15px;
        background: rgba(15, 23, 42, 0.98); padding: 15px;
        border-radius: 15px; border: 2px solid var(--neon-blue);
        width: 220px; z-index: 20; pointer-events: all;
    }

    .item {
        padding: 12px; margin-bottom: 8px; border-radius: 8px;
        background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
        font-size: 13px; border: 1px solid transparent;
    }
    .item:hover { border-color: var(--neon-blue); background: rgba(56, 189, 248, 0.1); }

    #bin {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%); font-size: 80px;
        transition: transform 0.1s; z-index: 5;
        user-select: none;
    }

    .trash { position: absolute; font-size: 50px; user-select: none; }
    .poop { position: absolute; font-size: 55px; filter: drop-shadow(0 0 10px brown); user-select: none; }

    #gameover {
        display: none; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); background: #000e;
        padding: 40px; border-radius: 25px; border: 2px solid var(--neon-pink);
        z-index: 100; box-shadow: 0 0 50px rgba(244, 114, 182, 0.4);
    }

    .active-power {
        position: absolute; bottom: 130px; left: 50%;
        transform: translateX(-50%); font-size: 16px; color: var(--neon-green); font-weight: bold;
    }

    button {
        padding: 15px 30px; border: none; background: var(--neon-blue);
        color: black; font-weight: 900; border-radius: 8px; cursor: pointer;
        font-family: 'Orbitron'; margin-top: 20px;
    }
</style>
</head>

<body>

<div id="ui-layer">
    <div class="stat" id="score">SCORE: 0</div>
    <div class="stat" id="coins">COINS: 💰 0</div>
    <div id="combo" style="color:orange; font-size: 18px; font-weight: bold;"></div>
</div>

<div id="shop-toggle" onclick="toggleShop()">🛒 BLACK MARKET</div>

<div id="shop-menu">
    <div class="item" onclick="buyPower('magnet')">🧲 MAGNET (50💰)<br><small>Sucks Trash to Bin</small></div>
    <div class="item" onclick="buyPower('slow')">⏰ TIME WARP (30💰)<br><small>Resets Fall Speed</small></div>
    <div class="item" onclick="buyPower('shield')">🛡️ BIO-SHIELD (100💰)<br><small>Survive 1 Miss</small></div>
</div>

<div id="active-p" class="active-power"></div>

<div id="game">
    <div id="bin">🗑️</div>
    
    <div id="gameover">
        <h2 id="death-reason" style="color:var(--neon-pink); margin-bottom: 5px;">SYSTEM CRASHED 💀</h2>
        <p id="finalscore" style="font-size: 20px;"></p>
        <button onclick="location.reload()">REBOOT SYSTEMS</button>
    </div>
</div>

<script>
const catchSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
const failSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');
const buySfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

let score = 0, coins = 0, combo = 0, speed = 5;
let playing = true, magnetActive = false, shieldActive = false;
let binX = window.innerWidth / 2;

const bin = document.getElementById("bin");

// Mouse & Touch Movement
const moveHandler = e => {
    binX = e.clientX || e.touches[0].clientX;
    bin.style.left = binX + "px";
};
document.addEventListener("mousemove", moveHandler);
document.addEventListener("touchmove", moveHandler);

function toggleShop() {
    let s = document.getElementById("shop-menu");
    s.style.display = (s.style.display === "block") ? "none" : "block";
}

function buyPower(type) {
    if (type === 'magnet' && coins >= 50) {
        coins -= 50; magnetActive = true; buySfx.play();
        showPower("MAGNET ONLINE 🧲");
        setTimeout(() => magnetActive = false, 8000);
    } else if (type === 'slow' && coins >= 30) {
        coins -= 30; speed = 5; buySfx.play();
        showPower("TIME STABILIZED ⏰");
    } else if (type === 'shield' && coins >= 100) {
        coins -= 100; shieldActive = true; buySfx.play();
        showPower("SHIELD DEPLOYED 🛡️");
    }
    updateUI();
}

function showPower(txt) {
    document.getElementById("active-p").innerText = txt;
    setTimeout(() => document.getElementById("active-p").innerText = "", 3000);
}

function spawnObject() {
    if (!playing) return;

    let obj = document.createElement("div");
    let isPoop = Math.random() < 0.15; // 15% chance to spawn poop
    
    obj.className = isPoop ? "poop" : "trash";
    let trashItems = ["🍌", "🧻", "🥤", "🍕", "🗞️", "🍔"];
    obj.innerText = isPoop ? "💩" : trashItems[Math.floor(Math.random() * trashItems.length)];
    
    let x = Math.random() * (window.innerWidth - 60);
    obj.style.left = x + "px";
    obj.style.top = "-60px";
    document.getElementById("game").appendChild(obj);

    let y = -60;
    let fall = setInterval(() => {
        if (!playing) { clearInterval(fall); obj.remove(); return; }

        y += speed;
        
        // Magnet Logic (Doesn't pull poop!)
        if (magnetActive && !isPoop) {
            let tx = parseFloat(obj.style.left);
            obj.style.left = (tx + (binX - tx) * 0.1) + "px";
        }

        obj.style.top = y + "px";
        let bRect = bin.getBoundingClientRect();
        let oRect = obj.getBoundingClientRect();

        // Collision Logic
        if (oRect.bottom >= bRect.top && oRect.left < bRect.right && oRect.right > bRect.left) {
            if (isPoop) {
                failSfx.play();
                gameOver("YOU CAUGHT THE POOP! 💩");
            } else {
                catchSfx.currentTime = 0; catchSfx.play();
                combo++; score += combo; coins += 2;
                updateUI();
                bin.style.transform = "translateX(-50%) scale(1.3)";
                setTimeout(() => bin.style.transform = "translateX(-50%) scale(1)", 100);
                speed += 0.2;
            }
            obj.remove(); clearInterval(fall);
        }

        // Missed Logic
        if (y > window.innerHeight) {
            if (!isPoop) { // Only care if we miss trash
                if (shieldActive) {
                    shieldActive = false;
                    showPower("SHIELD BROKEN! 🛡️");
                } else {
                    gameOver("SYSTEM OVERLOAD: TRASH MISSED!");
                }
            }
            obj.remove(); clearInterval(fall);
        }
    }, 20);
}

function updateUI() {
    document.getElementById("score").innerText = "SCORE: " + score;
    document.getElementById("coins").innerText = "COINS: 💰 " + coins;
    document.getElementById("combo").innerText = combo > 1 ? "COMBO x" + combo + " 🔥" : "";
}

function gameOver(reason) {
    playing = false;
    document.getElementById("death-reason").innerText = reason;
    document.getElementById("finalscore").innerText = "FINAL SCORE: " + score;
    document.getElementById("gameover").style.display = "block";
}

// Higher spawn rate as you get better
let spawnInterval = setInterval(spawnObject, 900);
</script>

</body>
</html>
