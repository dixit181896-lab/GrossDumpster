<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrossDump.ai — PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-pink: #f472b6;
            --neon-green: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0; overflow: hidden;
            background: #020617;
            font-family: 'Orbitron', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #boot-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #000);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
        }

        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.9);
            padding: 10px 15px; border-radius: 8px;
            border-left: 4px solid var(--neon-blue);
            font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 150px;
        }

        #hearts { color: var(--danger); font-size: 24px; filter: drop-shadow(0 0 5px var(--danger)); }

        #open-shop-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 20px; background: var(--neon-blue);
            color: #000; border-radius: 8px; cursor: pointer;
            font-weight: 900; z-index: 101; border: none;
            display: none;
        }

        #shop-menu {
            display: none; position: fixed; inset: 0; 
            background: rgba(2, 6, 23, 0.98); z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }

        .shop-item {
            background: rgba(30, 41, 59, 0.8); padding: 15px 25px;
            border-radius: 12px; border: 1px solid var(--neon-blue);
            width: 320px; display: flex; justify-content: space-between; align-items: center;
        }

        #bin {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); font-size: 80px;
            z-index: 50; pointer-events: none;
            display: none; /* Hidden until game starts */
        }

        .item { position: absolute; font-size: 50px; z-index: 40; pointer-events: none; }
        .poop { filter: drop-shadow(0 0 15px #78350f); }
        .magnet-glow { filter: drop-shadow(0 0 20px var(--neon-blue)); }

        #gameover {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.95);
            padding: 50px; border-radius: 20px; border: 2px solid var(--neon-pink);
            text-align: center; z-index: 6000;
        }

        .btn-main {
            padding: 15px 30px; background: var(--neon-blue);
            color: #000; font-weight: 900; border-radius: 50px;
            cursor: pointer; font-family: 'Orbitron'; border: none;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="color:var(--neon-blue); letter-spacing:8px; font-size: 3rem; margin-bottom: 30px; text-align: center;">GROSSDUMP.AI<br><span style="font-size: 1rem; letter-spacing: 2px; color: white;">v2.1 STABLE BUILD</span></h1>
    <button id="start-trigger" class="btn-main" onclick="initGame()">INITIALIZE CORE</button>
</div>

<div id="hud">
    <div class="stat-box">SCORE: <span id="score">0</span></div>
    <div class="stat-box">COINS: 💰 <span id="coins">0</span></div>
    <div id="hearts">❤️❤️❤️</div>
    <div id="combo-alert" style="color:var(--neon-blue); font-weight:900; height: 20px; margin-top: 5px;"></div>
</div>

<button id="open-shop-btn" onclick="toggleShop(true)">🛒 UPGRADES</button>

<div id="shop-menu">
    <h1 style="color:var(--neon-pink); letter-spacing: 5px;">MARKET_RESOURCES</h1>
    <div class="shop-item">
        <span>❤️ REPAIR</span>
        <button onclick="buy('heart', 150)" class="btn-main" style="padding:8px 15px; font-size:12px;">150💰</button>
    </div>
    <div class="shop-item">
        <span>🛡️ SHIELD</span>
        <button onclick="buy('shield', 75)" class="btn-main" style="padding:8px 15px; font-size:12px;">75💰</button>
    </div>
    <div class="shop-item">
        <span>⌛ SLOW-MO</span>
        <button onclick="buy('slow', 200)" class="btn-main" style="padding:8px 15px; font-size:12px;">200💰</button>
    </div>
    <div class="shop-item">
        <span>💎 2X COINS</span>
        <button onclick="buy('mult', 400)" class="btn-main" style="padding:8px 15px; font-size:12px;">400💰</button>
    </div>
    <button class="btn-main" onclick="toggleShop(false)" style="margin-top:20px; background:white;">RETURN TO FEED</button>
</div>

<div id="bin">🗑️</div>

<div id="gameover">
    <h1 id="death-msg" style="color:var(--neon-pink);">SYSTEM CRITICAL</h1>
    <p id="final-score" style="font-size:24px;"></p>
    <button class="btn-main" onclick="location.reload()">REBOOT SYSTEM</button>
</div>

<script>
    const sfx = {
        catch: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        poop: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),
        miss: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        buy: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
        level: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3')
    };

    let score = 0, coins = 0, lives = 3, combo = 0, speed = 5;
    let playing = false, magnetMode = false, hasShield = false, coinMult = 1;
    let lastLevelScore = 0;
    
    const bin = document.getElementById('bin');
    let binX = window.innerWidth / 2;

    window.onload = () => {
        console.log("System Ready");
    };

    function initGame() {
        // Unlock Audio with Catch to prevent hang
        Object.values(sfx).forEach(a => { 
            a.volume = 0.4;
            a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
        });
        
        // UI Transition
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('hud').style.opacity = '1';
        document.getElementById('open-shop-btn').style.display = 'block';
        bin.style.display = 'block';
        bin.style.left = binX + 'px';
        
        playing = true;
        updateUI();
        gameLoop();
    }
